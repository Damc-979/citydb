<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CityDB — Live Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0d0b;
  --bg2: #1a1612;
  --bg3: #221e18;
  --coral: #e07a5f;
  --coral-dark: #c96a52;
  --text: #f0ebe4;
  --muted: #8a7f74;
  --border: #2e2820;
  --green: #4a9d6b;
  --red: #c94c4c;
  --radius: 14px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
}
.nav-logo { font-size: 17px; font-weight: 700; color: var(--text); text-decoration: none; }
.nav-logo span { color: var(--coral); }
.nav-back { font-size: 13px; color: var(--muted); text-decoration: none; border: 1px solid var(--border); padding: 7px 14px; border-radius: 8px; }
.nav-back:hover { color: var(--text); }

/* SEARCH */
.search-wrap {
  max-width: 600px;
  margin: 48px auto 32px;
  padding: 0 24px;
  text-align: center;
}
.search-wrap h1 {
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 700;
  letter-spacing: -0.8px;
  margin-bottom: 8px;
}
.search-wrap p {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 24px;
}
.search-box {
  display: flex;
  gap: 8px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px 6px 6px 16px;
  transition: border-color 0.2s;
}
.search-box:focus-within { border-color: var(--coral); }
.search-box input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
}
.search-box input::placeholder { color: var(--muted); }
.search-btn {
  background: var(--coral);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s;
}
.search-btn:hover { background: var(--coral-dark); }

/* CITY CHIPS */
.city-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 16px;
}
.chip {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.chip:hover { border-color: var(--coral); color: var(--coral); }

/* RESULTS */
.results {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px 80px;
  display: none;
}
.city-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 32px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.city-name { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; }
.city-country { font-size: 14px; color: var(--muted); font-family: 'Courier Prime', monospace; }

/* PANELS GRID */
.panels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 640px) { .panels { grid-template-columns: 1fr; } }

.panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.panel.full { grid-column: 1 / -1; }
.panel-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--coral);
  margin-bottom: 16px;
}

/* EMERGENCY PANEL */
.emergency-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.emer-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
}
.emer-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.emer-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
.emer-tel { font-size: 13px; }
.emer-tel a { color: var(--coral); text-decoration: none; font-family: 'Courier Prime', monospace; }
.emer-tel a:hover { text-decoration: underline; }

/* CONSULATE */
.lang-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.lang-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.lang-btn.active { background: var(--coral); border-color: var(--coral); color: white; }
.consulate-detail { font-size: 14px; line-height: 1.7; }
.consulate-detail strong { display: block; margin-bottom: 4px; }
.consulate-detail a { color: var(--coral); text-decoration: none; font-family: 'Courier Prime', monospace; }

/* SCAMS */
.scam-list { display: flex; flex-direction: column; gap: 10px; }
.scam-item {
  background: var(--bg3);
  border-left: 3px solid var(--red);
  border-radius: 0 8px 8px 0;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.6;
  color: #d4c8be;
}
.scam-item strong { color: var(--text); display: block; margin-bottom: 2px; }

/* NO-GO */
.nogo-list { display: flex; flex-direction: column; gap: 8px; }
.nogo-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 13px;
  line-height: 1.5;
  color: #d4c8be;
}
.nogo-item::before {
  content: '⚠';
  color: #d4a84b;
  flex-shrink: 0;
  margin-top: 1px;
}

/* TRANSPORT */
.info-row { display: flex; flex-direction: column; gap: 8px; }
.info-item { font-size: 13px; line-height: 1.6; color: #d4c8be; }
.info-item strong { color: var(--coral); font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; display: block; margin-bottom: 2px; }

/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 60px 24px;
  color: var(--muted);
}
.empty-icon { font-size: 40px; margin-bottom: 16px; }
.empty h2 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
.empty p { font-size: 14px; }

/* WATERMARK */
.watermark {
  text-align: center;
  padding: 24px;
  font-size: 12px;
  color: var(--muted);
  border-top: 1px solid var(--border);
  margin-top: 40px;
}
.watermark a { color: var(--coral); text-decoration: none; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">City<span>DB</span></a>
  <a href="index.html" class="nav-back">← Back to dataset</a>
</nav>

<div class="search-wrap">
  <h1>Search a city</h1>
  <p>10 demo cities — consulates, emergency contacts, scams, no-go zones</p>
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Try: Tokyo, Dubai, London..." autocomplete="off">
    <button class="search-btn" onclick="doSearch()">Search</button>
  </div>
  <div class="city-chips" id="chips"></div>
</div>

<div class="results" id="results">
  <div class="city-header">
    <div class="city-name" id="city-name"></div>
    <div class="city-country" id="city-key"></div>
  </div>
  <div class="panels" id="panels"></div>
  <div class="watermark">
    Demo — 10 cities. Full dataset: 100 cities, 30+ fields. <a href="index.html">Get CityDB →</a>
  </div>
</div>

<div class="empty" id="empty">
  <div class="empty-icon">🌍</div>
  <h2>Pick a city</h2>
  <p>Search above or tap one of the demo cities</p>
</div>

<script>
var DEMO_CITIES = {
  "DE-frankfurt": { display: "Frankfurt", flag: "🇩🇪" },
  "HR-zagreb":    { display: "Zagreb",    flag: "🇭🇷" },
  "GB-london":    { display: "London",    flag: "🇬🇧" },
  "FR-paris":     { display: "Paris",     flag: "🇫🇷" },
  "JP-tokyo":     { display: "Tokyo",     flag: "🇯🇵" },
  "US-newyork":   { display: "New York",  flag: "🇺🇸" },
  "US-sanfrancisco": { display: "San Francisco", flag: "🇺🇸" },
  "AE-dubai":     { display: "Dubai",     flag: "🇦🇪" },
  "TR-istanbul":  { display: "Istanbul",  flag: "🇹🇷" },
  "SG-singapore": { display: "Singapore", flag: "🇸🇬" },
};

var LANG_LABELS = { en:"EN", de:"DE", fr:"FR", hr:"HR", it:"IT", es:"ES", hi:"HI", ar:"AR", zh:"ZH", ja:"JA" };
var activeLang = "en";
var currentKey = null;

// Build chips
var chipsEl = document.getElementById("chips");
Object.keys(DEMO_CITIES).forEach(function(key) {
  var c = DEMO_CITIES[key];
  var btn = document.createElement("button");
  btn.className = "chip";
  btn.textContent = c.flag + " " + c.display;
  btn.onclick = function() { loadCity(key); };
  chipsEl.appendChild(btn);
});

// Search
document.getElementById("search-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doSearch();
});

function doSearch() {
  var q = document.getElementById("search-input").value.trim().toLowerCase();
  if (!q) return;
  var found = null;
  Object.keys(DEMO_CITIES).forEach(function(key) {
    var city = DEMO_CITIES[key].display.toLowerCase();
    if (city.indexOf(q) === 0 || q.indexOf(city.split(" ")[0].toLowerCase()) === 0) found = key;
  });
  if (found) {
    loadCity(found);
  } else {
    document.getElementById("city-name").textContent = "City not in demo";
    document.getElementById("city-key").textContent = "Try: " + Object.values(DEMO_CITIES).map(function(c){return c.display;}).join(", ");
    document.getElementById("results").style.display = "block";
    document.getElementById("empty").style.display = "none";
    document.getElementById("panels").innerHTML = '<div style="color:var(--muted);font-size:14px;padding:20px 0">This demo includes 10 cities. <a href="index.html" style="color:var(--coral)">Get the full dataset →</a></div>';
  }
}

function loadCity(key) {
  if (!window.CITY_DB || !CITY_DB[key]) {
    alert("Data not loaded yet — make sure citydb.js is in the same folder.");
    return;
  }
  currentKey = key;
  activeLang = "en";
  var cd = CITY_DB[key];
  var meta = DEMO_CITIES[key];

  document.getElementById("city-name").textContent = meta.flag + " " + meta.display;
  document.getElementById("city-key").textContent = key;
  document.getElementById("results").style.display = "block";
  document.getElementById("empty").style.display = "none";
  document.getElementById("search-input").value = meta.display;

  renderPanels(key, cd);
}

function renderPanels(key, cd) {
  var html = "";

  // Emergency contacts
  html += '<div class="panel">';
  html += '<div class="panel-title">🚨 Emergency Contacts</div>';
  html += '<div class="emergency-grid">';
  if (cd.hospital) html += emerCard("Hospital", cd.hospital.name, cd.hospital.tel);
  if (cd.police_main) html += emerCard("Police", cd.police_main.name, cd.police_main.tel);
  if (cd.pharmacy_24h) html += emerCard("Pharmacy 24h", cd.pharmacy_24h.name, cd.pharmacy_24h.tel);
  if (cd.airport) html += emerCard("Airport · " + cd.airport.iata, cd.airport.name, cd.airport.tel);
  html += '</div></div>';

  // Consulate
  html += '<div class="panel">';
  html += '<div class="panel-title">🏛 Consulate</div>';
  html += '<div class="lang-tabs" id="lang-tabs">';
  if (cd.consulate) {
    Object.keys(cd.consulate).forEach(function(lang) {
      var active = lang === activeLang ? " active" : "";
      html += '<button class="lang-btn' + active + '" onclick="switchLang(\'' + key + '\',\'' + lang + '\')">' + (LANG_LABELS[lang] || lang.toUpperCase()) + '</button>';
    });
  }
  html += '</div>';
  html += '<div class="consulate-detail" id="consulate-detail">';
  if (cd.consulate) {
    var sel = cd.consulate[activeLang] || cd.consulate[Object.keys(cd.consulate)[0]];
    html += consulateHtml(sel);
  }
  html += '</div></div>';

  // Scams
  if (cd.scams && cd.scams.length) {
    html += '<div class="panel full">';
    html += '<div class="panel-title">⚠️ Scams to know</div>';
    html += '<div class="scam-list">';
    cd.scams.forEach(function(s) {
      var parts = s.split(":");
      var title = parts.length > 1 ? parts[0] : "";
      var body = parts.length > 1 ? parts.slice(1).join(":").trim() : s;
      html += '<div class="scam-item">' + (title ? '<strong>' + title + '</strong>' : '') + body + '</div>';
    });
    html += '</div></div>';
  }

  // No-go zones
  if (cd.no_go && cd.no_go.length) {
    html += '<div class="panel">';
    html += '<div class="panel-title">🚫 No-go zones</div>';
    html += '<div class="nogo-list">';
    cd.no_go.forEach(function(z) {
      html += '<div class="nogo-item">' + z + '</div>';
    });
    html += '</div></div>';
  }

  // Local intel
  html += '<div class="panel">';
  html += '<div class="panel-title">🧭 Local intel</div>';
  html += '<div class="info-row">';
  if (cd.public_transport) html += '<div class="info-item"><strong>Transport</strong>' + cd.public_transport + '</div>';
  if (cd.drinking_water) html += '<div class="info-item"><strong>Water</strong>' + cd.drinking_water + '</div>';
  if (cd.taxi) html += '<div class="info-item"><strong>Taxi</strong>' + cd.taxi.number + ' · App: ' + cd.taxi.app + '</div>';
  html += '</div></div>';

  // City facts
  html += '<div class="panel">';
  html += '<div class="panel-title">🏙 City facts</div>';
  html += '<div class="info-row">';
  if (cd.city_population) html += '<div class="info-item"><strong>Population</strong>' + cd.city_population.toLocaleString() + '</div>';
  if (cd.mayor) html += '<div class="info-item"><strong>Mayor</strong>' + cd.mayor + '</div>';
  if (cd.main_square) html += '<div class="info-item"><strong>Main square</strong>' + cd.main_square + '</div>';
  if (cd.happiness_rank) html += '<div class="info-item"><strong>Happiness rank</strong>#' + cd.happiness_rank + ' (World Happiness Report 2024)</div>';
  if (cd.religion) html += '<div class="info-item"><strong>Religion</strong>' + cd.religion + '</div>';
  if (cd.greeting) html += '<div class="info-item"><strong>Language</strong>' + cd.greeting.language + ' · Hello: ' + cd.greeting.hello + ' · Thank you: ' + cd.greeting.thankyou + '</div>';
  if (cd.tipping) html += '<div class="info-item"><strong>Tipping</strong>' + cd.tipping + '</div>';
  html += '</div></div>';

  // Conduct rules
  if (cd.conduct_rules && cd.conduct_rules.length) {
    html += '<div class="panel">';
    html += '<div class="panel-title">📋 Conduct rules</div>';
    html += '<div class="nogo-list">';
    cd.conduct_rules.forEach(function(r) {
      html += '<div class="nogo-item">' + r + '</div>';
    });
    html += '</div></div>';
  }

  // Food & drink
  html += '<div class="panel">';
  html += '<div class="panel-title">🍽 Food & drink</div>';
  html += '<div class="info-row">';
  if (cd.top_food && cd.top_food.length) {
    html += '<div class="info-item"><strong>Must eat</strong>' + cd.top_food.join(' · ') + '</div>';
  }
  if (cd.top_drink && cd.top_drink.length) {
    html += '<div class="info-item"><strong>Must drink</strong>' + cd.top_drink.join(' · ') + '</div>';
  }
  if (cd.restaurant_closing) html += '<div class="info-item"><strong>Hours</strong>' + cd.restaurant_closing + '</div>';
  html += '</div></div>';

  // Attractions
  if (cd.top_attraction && cd.top_attraction.length) {
    html += '<div class="panel">';
    html += '<div class="panel-title">📍 Top attractions</div>';
    html += '<div class="nogo-list">';
    cd.top_attraction.forEach(function(a) {
      html += '<div class="nogo-item" style="list-style:none">★ ' + a + '</div>';
    });
    html += '</div></div>';
  }

  // Business & sport
  html += '<div class="panel full">';
  html += '<div class="panel-title">🏢 Business & sport</div>';
  html += '<div class="info-row">';
  if (cd.famous_company && cd.famous_company.length) {
    html += '<div class="info-item"><strong>Famous companies</strong>' + cd.famous_company.join(' · ') + '</div>';
  }
  if (cd.sport_club) html += '<div class="info-item"><strong>Sport club</strong>' + cd.sport_club + '</div>';
  if (cd.stadium) html += '<div class="info-item"><strong>Stadium</strong>' + cd.stadium + '</div>';
  if (cd.main_newspaper) html += '<div class="info-item"><strong>Main newspaper</strong>' + cd.main_newspaper + '</div>';
  if (cd.main_tv) html += '<div class="info-item"><strong>Main TV</strong>' + cd.main_tv + '</div>';
  html += '</div></div>';

  document.getElementById("panels").innerHTML = html;
}

function emerCard(label, name, tel) {
  var telHtml = tel ? '<a href="tel:' + tel.replace(/\s/g,"") + '">' + tel + '</a>' : "";
  return '<div class="emer-card"><div class="emer-label">' + label + '</div><div class="emer-name">' + (name || "") + '</div><div class="emer-tel">' + telHtml + '</div></div>';
}

function consulateHtml(sel) {
  if (!sel) return "";
  var tel = sel.tel ? '<a href="tel:' + sel.tel.replace(/\s/g,"") + '">' + sel.tel + '</a>' : "";
  return '<strong>' + (sel.name || "") + '</strong>' + (sel.address || "") + '<br>' + (tel ? 'Tel: ' + tel : "");
}

function switchLang(key, lang) {
  activeLang = lang;
  var cd = CITY_DB[key];
  if (!cd || !cd.consulate) return;
  // Update buttons
  document.querySelectorAll(".lang-btn").forEach(function(btn) {
    btn.classList.toggle("active", btn.textContent === (LANG_LABELS[lang] || lang.toUpperCase()));
  });
  // Update detail
  var sel = cd.consulate[lang] || cd.consulate[Object.keys(cd.consulate)[0]];
  document.getElementById("consulate-detail").innerHTML = consulateHtml(sel);
}
</script>
<script src="citydb.js"></script>
</body>
</html>
